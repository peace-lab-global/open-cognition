<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Open Cognition (Mono)">
  <title>Open Cognition · Mono</title>

  <!-- 放射连接线 -->
  <g stroke="#1a1a1a" stroke-width="2.4" stroke-opacity="0.28" stroke-linecap="round" fill="none">
    <line x1="512" y1="512" x2="512" y2="152"/>
    <line x1="512" y1="512" x2="766.56" y2="257.44"/>
    <line x1="512" y1="512" x2="872"    y2="512"/>
    <line x1="512" y1="512" x2="766.56" y2="766.56"/>
    <line x1="512" y1="512" x2="512"    y2="872"/>
    <line x1="512" y1="512" x2="257.44" y2="766.56"/>
    <line x1="512" y1="512" x2="152"    y2="512"/>
    <line x1="512" y1="512" x2="257.44" y2="257.44"/>
  </g>

  <!-- 跨学科互链 -->
  <g stroke="#1a1a1a" stroke-width="1.6" stroke-opacity="0.15" stroke-linecap="round" fill="none">
    <path d="M 257.44 257.44 Q 512 200 766.56 257.44"/>
    <path d="M 766.56 257.44 Q 920 512 766.56 766.56"/>
    <path d="M 766.56 766.56 Q 512 920 257.44 766.56"/>
    <path d="M 257.44 766.56 Q 104 512 257.44 257.44"/>
  </g>

  <!-- 中心开放 O -->
  <path d="M 478.35 386.42 A 130 130 0 1 1 545.65 386.42"
        stroke="#1a1a1a" stroke-width="34" fill="none" stroke-linecap="round"/>

  <!-- 顶部"洞见点"（黑色实心） -->
  <circle cx="512" cy="152" r="36" fill="#1a1a1a"/>

  <!-- 7 节点（黑色描边，白色填充） -->
  <g fill="#ffffff" stroke="#1a1a1a" stroke-width="6">
    <circle cx="257.44" cy="257.44" r="40"/>
    <circle cx="766.56" cy="257.44" r="40"/>
    <circle cx="152"    cy="512"    r="40"/>
    <circle cx="872"    cy="512"    r="40"/>
    <circle cx="257.44" cy="766.56" r="40"/>
    <circle cx="766.56" cy="766.56" r="40"/>
    <circle cx="512"    cy="872"    r="40"/>
  </g>

  <!-- 节点中心小黑点（区分 7 个领域为"内核"） -->
  <g fill="#1a1a1a">
    <circle cx="257.44" cy="257.44" r="10"/>
    <circle cx="766.56" cy="257.44" r="10"/>
    <circle cx="152"    cy="512"    r="10"/>
    <circle cx="872"    cy="512"    r="10"/>
    <circle cx="257.44" cy="766.56" r="10"/>
    <circle cx="766.56" cy="766.56" r="10"/>
    <circle cx="512"    cy="872"    r="10"/>
  </g>
</svg>
