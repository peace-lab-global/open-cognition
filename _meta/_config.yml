title: Open Cognition
description: Cross-domain cognitive knowledge base
markdown: GFM
theme: jekyll-theme-cayman

exclude:
  - node_modules
  - scripts
  - .qoder
  - .claude
  - AGENT.md
  - QUICKSTART.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .github

plugins:
  - jekyll-relative-links
  - jekyll-sitemap

relative_links:
  enabled: true
  collections: false
