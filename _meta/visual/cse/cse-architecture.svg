  <text x="130" y="268" text-anchor="middle" fill="#58a6ff" font-size="9">3 思想家 · 2 概念</text>

  <!-- Ecological -->
  <rect x="250" y="160" width="200" height="120" rx="8" fill="#161b22" stroke="#56d364" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="350" y="182" text-anchor="middle" fill="#56d364" font-size="13" font-weight="600">生态心理学 Ecological</text>
  <text x="350" y="200" text-anchor="middle" fill="#c9d1d9" font-size="11">Gibson · Clark · Varela</text>
  <text x="350" y="216" text-anchor="middle" fill="#8b949e" font-size="9">可供性 · 延展认知 · 生成认知</text>
  <text x="350" y="236" text-anchor="middle" fill="#56d36440" font-size="9">───────────</text>
