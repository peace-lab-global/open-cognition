<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" width="1600" height="480" role="img" aria-label="Open Cognition · 开放认知">
  <title>Open Cognition · 开放认知</title>

  <!-- 米色背景（与项目主基调一致） -->
  <rect width="1600" height="480" rx="32" ry="32" fill="#faf9f6"/>
  <!-- 顶部装饰：黄色斜线（项目签名） -->
  <rect x="40" y="40" width="4" height="96" fill="#f4d03f" transform="rotate(-2 42 88)" opacity="0.85"/>

  <!-- ─────────── LOGO MARK（左侧，缩放 0.4） ─────────── -->
  <g transform="translate(40 40) scale(0.39)">
    <!-- 放射连接线 -->
    <g stroke="#1a1a1a" stroke-width="2.4" stroke-opacity="0.22" stroke-linecap="round" fill="none">
      <line x1="512" y1="512" x2="512" y2="152"/>
      <line x1="512" y1="512" x2="766.56" y2="257.44"/>
      <line x1="512" y1="512" x2="872"    y2="512"/>
      <line x1="512" y1="512" x2="766.56" y2="766.56"/>
      <line x1="512" y1="512" x2="512"    y2="872"/>
      <line x1="512" y1="512" x2="257.44" y2="766.56"/>
      <line x1="512" y1="512" x2="152"    y2="512"/>
      <line x1="512" y1="512" x2="257.44" y2="257.44"/>
    </g>
    <!-- 跨学科互链 -->
    <g stroke="#1a1a1a" stroke-width="1.6" stroke-opacity="0.12" stroke-linecap="round" fill="none">
      <path d="M 257.44 257.44 Q 512 200 766.56 257.44"/>
      <path d="M 766.56 257.44 Q 920 512 766.56 766.56"/>
      <path d="M 766.56 766.56 Q 512 920 257.44 766.56"/>
      <path d="M 257.44 766.56 Q 104 512 257.44 257.44"/>
    </g>
    <!-- 中心开放 O -->
    <path d="M 478.35 386.42 A 130 130 0 1 1 545.65 386.42"
          stroke="#1a1a1a" stroke-width="34" fill="none" stroke-linecap="round"/>
    <path d="M 410.18 593.50 A 130 130 0 0 0 613.82 593.50"
          stroke="#f4d03f" stroke-width="14" fill="none" stroke-linecap="round" stroke-opacity="0.95"/>
    <!-- 顶部金点 -->
    <circle cx="512" cy="152" r="36" fill="#f4d03f" stroke="#1a1a1a" stroke-width="6"/>
    <circle cx="500" cy="142" r="9"  fill="#ffffff" fill-opacity="0.55"/>
    <!-- 7 节点 -->
    <circle cx="257.44" cy="257.44" r="40" fill="#8b5cf6" stroke="#1a1a1a" stroke-width="5"/>
    <circle cx="766.56" cy="257.44" r="40" fill="#06b6d4" stroke="#1a1a1a" stroke-width="5"/>
    <circle cx="152"    cy="512"    r="40" fill="#f59e0b" stroke="#1a1a1a" stroke-width="5"/>
    <circle cx="872"    cy="512"    r="40" fill="#ec4899" stroke="#1a1a1a" stroke-width="5"/>
    <circle cx="257.44" cy="766.56" r="40" fill="#3b82f6" stroke="#1a1a1a" stroke-width="5"/>
    <circle cx="766.56" cy="766.56" r="40" fill="#ef4444" stroke="#1a1a1a" stroke-width="5"/>
    <circle cx="512"    cy="872"    r="40" fill="#10b981" stroke="#1a1a1a" stroke-width="5"/>
    <!-- 节点高光 -->
    <g fill="#ffffff" fill-opacity="0.45">
      <circle cx="247" cy="247" r="9"/>
      <circle cx="756" cy="247" r="9"/>
      <circle cx="142" cy="502" r="9"/>
      <circle cx="862" cy="502" r="9"/>
      <circle cx="247" cy="756" r="9"/>
      <circle cx="756" cy="756" r="9"/>
      <circle cx="502" cy="862" r="9"/>
    </g>
  </g>

  <!-- ─────────── 文字部分 ─────────── -->
  <!-- 顶部 brand label -->
  <text x="540" y="115"
        font-family="'Helvetica Neue','Inter',Arial,sans-serif"
        font-size="20" font-weight="600"
        letter-spacing="10"
        fill="#1a1a1a" fill-opacity="0.40">CROSS-DISCIPLINARY · v0.5</text>

  <!-- 主标题 Open Cognition（系统衬线字体，避免外网字体加载） -->
  <text x="540" y="245"
        font-family="Georgia,'Times New Roman','Playfair Display',serif"
        font-size="118" font-weight="900"
        letter-spacing="-3"
        fill="#1a1a1a">Open</text>
  <text x="784" y="245"
        font-family="Georgia,'Times New Roman','Playfair Display',serif"
        font-size="118" font-weight="900"
        letter-spacing="-3"
        fill="#1a1a1a">Cognition</text>

  <!-- 黄色手绘下划线 -->
  <path d="M 540 268 Q 800 261 1130 268"
        stroke="#f4d03f" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- 中文副标题（macOS 系统中文字体） -->
  <text x="540" y="335"
        font-family="'Songti SC','STSong','SimSun','Noto Serif SC',serif"
        font-size="36" font-weight="700"
        letter-spacing="6"
        fill="#1a1a1a">开放认知</text>
  <text x="715" y="335"
        font-family="'Songti SC','STSong','SimSun','Noto Serif SC',serif"
        font-size="30" font-weight="400"
        letter-spacing="3"
        fill="#1a1a1a" fill-opacity="0.55">· 跨学科认知数据库</text>

  <!-- 底部 tagline -->
  <text x="540" y="395"
        font-family="'Helvetica Neue','Inter',Arial,sans-serif"
        font-size="18" font-weight="400"
        letter-spacing="3"
        fill="#1a1a1a" fill-opacity="0.45">FOR DEEP READING &amp; AI AGENTS  ·  CC BY-SA 4.0</text>

  <!-- 右侧装饰金色徽章 -->
  <g transform="translate(1430 65) rotate(-2)">
    <rect width="130" height="36" fill="#f4d03f" stroke="#1a1a1a" stroke-width="2.5"/>
    <text x="65" y="24" text-anchor="middle"
          font-family="'Helvetica Neue','Inter',Arial,sans-serif"
          font-size="13" font-weight="700"
          letter-spacing="4"
          fill="#1a1a1a">OPEN SOURCE</text>
  </g>
</svg>
