<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" width="1600" height="480" role="img" aria-label="Open Cognition · 开放认知 (Zen Horizontal)">
  <title>Open Cognition · 开放认知 (Zen Horizontal)</title>

  <!-- ─────────── 宣纸色背景 ─────────── -->
  <rect width="1600" height="480" rx="16" ry="16" fill="#f5f0e5"/>

  <defs>
    <radialGradient id="ink-bleed-h" cx="40%" cy="35%" r="70%">
      <stop offset="0%"  stop-color="#f0d588" stop-opacity="1"/>
      <stop offset="55%" stop-color="#c9a23a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8b6a1e" stop-opacity="1"/>
    </radialGradient>
    <filter id="ink-bleed" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- ─────────── LOGO MARK（左侧，缩放 0.35） ─────────── -->
  <g transform="translate(60 72) scale(0.35)">
    <path
      d="M 660,260
         C 800,330  880,450  875,560
         C 870,700  740,840  580,870
         C 430,895  290,825  215,705
         C 145,590  155,440  235,325
         C 295,240  375,225  400,245"
      fill="none" stroke="#1a1a1a" stroke-width="22"
      stroke-linecap="round" stroke-linejoin="round"
      filter="url(#ink-bleed)"
    />
    <circle cx="528" cy="178" r="26" fill="url(#ink-bleed-h)"/>
  </g>

  <!-- ─────────── 右侧：书法风中文标题 ─────────── -->
  <text x="520" y="250"
        font-family="'Ma Shan Zheng','STKaiti','Kaiti SC','Songti SC','Noto Serif SC',serif"
        font-size="120" font-weight="400"
        letter-spacing="8"
        fill="#1a1a1a">开放认知</text>

  <!-- 金色毛笔下划线（与顿悟点呼应，细而有力） -->
  <path d="M 520 278 Q 780 270 1040 278"
        stroke="url(#ink-bleed-h)" stroke-width="3.5"
        fill="none" stroke-linecap="round"
        stroke-opacity="0.85"/>

  <!-- 副标题：英文名（极克制的小字，字距拉开） -->
  <text x="520" y="335"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="20" font-weight="400"
        letter-spacing="12"
        fill="#1a1a1a" fill-opacity="0.55">OPEN  COGNITION</text>

  <!-- 底部 tagline -->
  <text x="520" y="395"
        font-family="'Songti SC','STSong','SimSun','Noto Serif SC',serif"
        font-size="16" font-weight="400"
        letter-spacing="3"
        fill="#1a1a1a" fill-opacity="0.45">跨学科认知数据库 · v0.5 · CC BY-SA 4.0</text>

  <!-- 右下角：传统红色落款章（"印"），禅意签名的最后一笔 -->
  <g transform="translate(1470 340) rotate(-2)">
    <rect width="64" height="64" fill="#b23a2e" rx="3" ry="3" opacity="0.92"/>
    <text x="32" y="46" text-anchor="middle"
          font-family="'STKaiti','Kaiti SC','Ma Shan Zheng',serif"
          font-size="38" font-weight="700"
          fill="#f5f0e5">印</text>
  </g>
</svg>
