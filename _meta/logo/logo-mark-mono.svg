<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Open Cognition · Mono (Zen)">
  <title>Open Cognition · Mono (Zen)</title>

  <defs>
    <filter id="ink-bleed-m" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- 一笔円相（纯黑，单色印刷 / 水印场景） -->
  <path
    d="M 660,260
       C 800,330  880,450  875,560
       C 870,700  740,840  580,870
       C 430,895  290,825  215,705
       C 145,590  155,440  235,325
       C 295,240  375,225  400,245"
    fill="none"
    stroke="#1a1a1a"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#ink-bleed-m)"
  />

  <!-- 顿悟点（纯黑圆，保留形状不保留颜色） -->
  <circle cx="528" cy="178" r="26" fill="#1a1a1a"/>
</svg>
