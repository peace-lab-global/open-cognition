<!-- Custom head elements for GitHub Pages / Jekyll -->
<meta name="theme-color" content="#159957">
<style>
  /* Improve readability for knowledge-base content */
  .page-header {
    padding: 2rem 1rem;
  }
  .main-content {
    max-width: 72rem;
  }
  .main-content table {
    display: table;
    width: 100%;
    border-collapse: collapse;
  }
  .main-content table th,
  .main-content table td {
    padding: 0.5rem 0.75rem;
    border: 1px solid #e9ebec;
  }
  .main-content code {
    font-size: 0.85em;
  }
</style>
