l":"生成认知"},{"source":"resilience-engineering","target":"woods","label":"伍兹 David Woods"},{"source":"resilience-engineering","target":"joint-cognitive-system","label":"联合认知系统"},{"source":"resilience-engineering","target":"situation-awareness","label":"人为错误分析"},{"source":"resilience-engineering","target":"sensemaking","label":"意义建构"},{"source":"resilience-engineering","target":"ashby","label":"阿什比 Ashby"}]};

  "naturalistic-decision": {color:"#ffa657", label:"自然决策 Naturalistic"},

  "automation-sociotechnical": {color:"#7ee787", label:"自动化与社会技术"},

const width = window.innerWidth, height = window.innerHeight;
const svg = d3.select("svg").attr("viewBox",[0,0,width,height]);
const g = svg.append("g");

// Arrow markers
svg.append("defs").selectAll("marker").data(["arrow"]).join("marker")
  .attr("id","arrow").attr("viewBox","0 -3 6 6").attr("refX",18).attr("refY",0)
  .attr("markerWidth",4).attr("markerHeight",4).attr("orient","auto")
  .append("path").attr("d","M0,-3L6,0L0,3").attr("fill","#ffffff30");

// Process data
const nodes = DATA.nodes.map(d => ({...d, schoolColor: SCHOOLS[d.school]?.color || "#888"}));
const edges = DATA.edges.map(d => ({...d}));

const nodeMap = new Map(nodes.map(d => [d.id, d]));

const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(edges).id(d=>d.id).distance(90))
  .force("charge", d3.forceManyBody().strength(-220))
  .force("center", d3.forceCenter(width/2, height/2))
  .force("collision", d3.forceCollide().radius(d => d.type==="thinker"?18:d.type==="concept"?14:20))
  .force("x", d3.forceX(width/2).strength(0.03))
  .force("y", d3.forceY(height/2).strength(0.03));

// Edges
const link = g.append("g").selectAll("line").data(edges).join("line")
  .attr("stroke","#ffffff15").attr("stroke-width",1)
  .attr("marker-end","url(#arrow)");

// Nodes
const node = g.append("g").selectAll("g").data(nodes).join("g")
  .attr("class","node").call(d3.drag().on("start",dragStart).on("drag",dragging).on("end",dragEnd));

// Draw shapes
node.each(function(d) {
  const el = d3.select(this);
  const c = d.schoolColor;
  if(d.type==="thinker") {
    el.append("circle").attr("r",11).attr("fill",c).attr("fill-opacity",0.8)
      .attr("stroke",c).attr("stroke-width",1.5).attr("stroke-opacity",0.4);
    el.append("circle").attr("r",11).attr("fill","none").attr("stroke",c)
      .attr("stroke-width",0.5).attr("stroke-opacity",0.2)
      .style("filter","drop-shadow(0 0 6px "+c+"40)");
  } else if(d.type==="concept") {
    el.append("rect").attr("x",-8).attr("y",-8).attr("width",16).attr("height",16)
      .attr("transform","rotate(45)").attr("fill",c).attr("fill-opacity",0.75)
      .attr("stroke",c).attr("stroke-width",1.5).attr("stroke-opacity",0.4)
      .style("filter","drop-shadow(0 0 5px "+c+"30)");
  } else {
    el.append("rect").attr("x",-16).attr("y",-7).attr("width",32).attr("height",14)
      .attr("rx",4).attr("fill",c).attr("fill-opacity",0.7)
      .attr("stroke",c).attr("stroke-width",1.5).attr("stroke-opacity",0.4)
      .style("filter","drop-shadow(0 0 5px "+c+"30)");
  }
});

// Labels (show for thinkers and on zoom)
const label = g.append("g").selectAll("text").data(nodes).join("text")
  .text(d => {
    const t = d.title;
    const m = t.match(/^[\u4e00-\u9fff·\s]+/);
    return m ? m[0].trim() : t.split(" ")[0];
  })
  .attr("font-size", d => d.type==="thinker"?"10px":"9px")
  .attr("fill","#c9d1d9").attr("text-anchor","middle")
  .attr("dy", d => d.type==="thinker"?24:d.type==="concept"?22:22)
  .attr("opacity", d => d.type==="thinker"?0.8:0.5)
  .style("pointer-events","none");

// Zoom
const zoom = d3.zoom().scaleExtent([0.3,5]).on("zoom", e => {
  g.attr("transform", e.transform);
  const k = e.transform.k;
  label.attr("opacity", d => {
    if(d.type==="thinker") return k>0.7?0.8:0;
    return k>1.2?0.7:0;
  });
});
svg.call(zoom);

// Tooltip
const tooltip = d3.select("#tooltip");
node.on("mouseover", (e,d) => {
  const tt = SCHOOLS[d.school]?.label || d.school;
  tooltip.select(".tt-title").text(d.title);
  tooltip.select(".tt-type").text(d.type==="thinker"?"👤 思想家":d.type==="concept"?"💡 概念":"🔧 Skill");
  tooltip.select(".tt-school").text(tt);
  tooltip.style("opacity",1).style("left",(e.pageX+12)+"px").style("top",(e.pageY-10)+"px");
}).on("mousemove", e => {
  tooltip.style("left",(e.pageX+12)+"px").style("top",(e.pageY-10)+"px");
}).on("mouseout", () => tooltip.style("opacity",0));

// Click highlight
let selectedNode = null;
node.on("click", (e,d) => {
  e.stopPropagation();
  if(selectedNode===d) { resetHighlight(); selectedNode=null; return; }
  selectedNode = d;
  const neighbors = new Set();
  edges.forEach(e => {
    if(e.source.id===d.id) neighbors.add(e.target.id);
    if(e.target.id===d.id) neighbors.add(e.source.id);
  });
  neighbors.add(d.id);
  node.style("opacity", n => neighbors.has(n.id)?1:0.1);
  link.style("opacity", e => (e.source.id===d.id||e.target.id===d.id)?0.8:0.03);
  label.style("opacity", n => neighbors.has(n.id)?1:0.05);
});
svg.on("click", () => { resetHighlight(); selectedNode=null; });
function resetHighlight() {
  node.style("opacity",1); link.style("opacity",1);
  label.style("opacity", d => d.type==="thinker"?0.8:0.5);
}

// Simulation tick
simulation.on("tick", () => {
  link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  node.attr("transform", d => "translate("+d.x+","+d.y+")");
  label.attr("x", d=>d.x).attr("y", d=>d.y);
});

function dragStart(e,d) { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
function dragging(e,d) { d.fx=e.x; d.fy=e.y; }
function dragEnd(e,d) { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }

// Legend
const legend = d3.select("#legend");
legend.append("h3").text("图例 Legend");
Object.entries(SCHOOLS).forEach(([k,v]) => {
  const item = legend.append("div").attr("class","legend-item");
  if(k==="skills") item.append("div").attr("class","legend-rect").style("background",v.color);
  else if(k==="cognitive-systems") item.append("div").attr("class","legend-diamond").style("background",v.color);
  else item.append("div").attr("class","legend-dot").style("background",v.color);
  item.append("span").text(v.label).style("color","#c9d1d9");
});

// Filters
const filters = d3.select("#filters");
filters.append("h3").text("筛选 Filters");
const activeSchools = new Set(Object.keys(SCHOOLS));
Object.entries(SCHOOLS).forEach(([k,v]) => {
  const item = filters.append("label").attr("class","filter-item");
  const cb = item.append("input").attr("type","checkbox").attr("checked",true);
  item.append("span").text(v.label).style("color","#c9d1d9");
  cb.on("change", function() {
    if(this.checked) activeSchools.add(k); else activeSchools.delete(k);
    node.style("display", d => activeSchools.has(d.school)?null:"none");
    link.style("display", e => activeSchools.has(e.source.school)&&activeSchools.has(e.target.school)?null:"none");
    label.style("display", d => activeSchools.has(d.school)?null:"none");
  });
});

// Stats
const schoolSet = new Set(nodes.map(n=>n.school));
d3.select("#nodeCount").text(nodes.length);
d3.select("#edgeCount").text(edges.length);
d3.select("#schoolCount").text(schoolSet.size);
</script>
</body>
</html>
